<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page d'Information</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --coral-light: #FFF0F0;
    --sky: #4ECDC4;
    --sky-light: #EDFCFA;
    --violet: #7C5CFC;
    --violet-light: #F0EDFF;
    --sun: #FFB340;
    --sun-light: #FFF6E6;
    --mint: #2ED47A;
    --mint-light: #EAFBF1;
    --rose: #F76CA5;
    --rose-light: #FFF0F6;
    --ocean: #3B82F6;
    --ocean-light: #EEF4FF;
    --lavender: #A78BFA;
    --lavender-light: #F3F0FF;
    --amber: #F59E0B;
    --amber-light: #FFFBEB;
    --indigo: #6366F1;
    --indigo-light: #EEF2FF;
    --emerald: #059669;
    --emerald-light: #ECFDF5;
    --fuchsia: #D946EF;
    --fuchsia-light: #FDF4FF;
    --teal: #14B8A6;
    --teal-light: #F0FDFA;
    --slate: #475569;
    --slate-light: #F1F5F9;
    --bg: #FAFBFE;
    --text: #1E293B;
    --text-dim: #64748B;
    --white: #FFFFFF;
    --border: #E2E8F0;
    --danger: #EF4444;
    --success: #10B981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Blobs ── */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(80px);
    opacity: 0.25; pointer-events: none; z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--coral); top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--sky); bottom: -100px; left: -80px; }
  .blob-3 { width: 350px; height: 350px; background: var(--violet); top: 40%; left: 50%; transform: translateX(-50%); }

  /* ── Main page ── */
  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { text-align: center; margin-bottom: 48px; animation: popIn 0.6s ease both; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--violet), var(--rose));
    color: white; font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 6px 16px; border-radius: 100px; margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 700;
    background: linear-gradient(135deg, var(--violet) 0%, var(--coral) 50%, var(--sun) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1.2; margin-bottom: 10px;
  }
  header p { color: var(--text-dim); font-size: 1.05rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }

  .section { margin-bottom: 40px; animation: popIn 0.6s ease both; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-left: 4px; }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  .card {
    display: flex; align-items: center; gap: 14px; padding: 18px 20px;
    border-radius: 16px; text-decoration: none; color: var(--text);
    border: 1.5px solid transparent;
    transition: all 0.3s cubic-bezier(0.25, 0, 0, 1);
    position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  .card:active { transform: scale(0.98); }

  .card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0; transition: transform 0.3s ease; overflow: hidden;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .card:hover .card-icon { transform: scale(1.1) rotate(-4deg); }

  .card-info { flex: 1; min-width: 0; }
  .card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
  .card-desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.4; }

  .card-arrow { font-size: 1.2rem; font-weight: 300; opacity: 0; transform: translateX(-8px); transition: all 0.3s ease; flex-shrink: 0; }
  .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  .card.coral    { background: var(--coral-light);  border-color: rgba(255,107,107,0.15); }
  .card.coral    .card-icon { background: var(--coral); color: white; }
  .card.coral:hover { border-color: var(--coral); }
  .card.sky      { background: var(--sky-light);    border-color: rgba(78,205,196,0.15); }
  .card.sky      .card-icon { background: var(--sky); color: white; }
  .card.sky:hover { border-color: var(--sky); }
  .card.violet   { background: var(--violet-light); border-color: rgba(124,92,252,0.15); }
  .card.violet   .card-icon { background: var(--violet); color: white; }
  .card.violet:hover { border-color: var(--violet); }
  .card.civis    { background: var(--sun-light);    border-color: rgb(255,107,107,0.15); }
  .card.civis    .card-icon { background: rgba(255, 212, 45); color: rgb(255, 0, 0); }
  .card.civis:hover { border-color: var(--sun); }
  .card.mint     { background: var(--mint-light);   border-color: rgba(46,212,122,0.15); }
  .card.mint     .card-icon { background: var(--mint); color: white; }
  .card.mint:hover { border-color: var(--mint); }
  .card.rose     { background: var(--rose-light);   border-color: rgba(247,108,165,0.15); }
  .card.rose     .card-icon { background: var(--rose); color: white; }
  .card.rose:hover { border-color: var(--rose); }
  .card.ocean    { background: var(--ocean-light);  border-color: rgba(59,130,246,0.15); }
  .card.ocean    .card-icon { background: var(--ocean); color: white; }
  .card.ocean:hover { border-color: var(--ocean); }
  .card.lavender { background: var(--lavender-light); border-color: rgba(167,139,250,0.15); }
  .card.lavender .card-icon { background: var(--lavender); color: white; }
  .card.lavender:hover { border-color: var(--lavender); }
  .card.amber    { background: var(--amber-light);  border-color: rgba(245,158,11,0.15); }
  .card.amber    .card-icon { background: var(--amber); color: white; }
  .card.amber:hover { border-color: var(--amber); }
  .card.indigo   { background: var(--indigo-light); border-color: rgba(99,102,241,0.15); }
  .card.indigo   .card-icon { background: var(--indigo); color: white; }
  .card.indigo:hover { border-color: var(--indigo); }
  .card.emerald  { background: var(--emerald-light); border-color: rgba(5,150,105,0.15); }
  .card.emerald  .card-icon { background: var(--emerald); color: white; }
  .card.emerald:hover { border-color: var(--emerald); }
  .card.fuchsia  { background: var(--fuchsia-light); border-color: rgba(217,70,239,0.15); }
  .card.fuchsia  .card-icon { background: var(--fuchsia); color: white; }
  .card.fuchsia:hover { border-color: var(--fuchsia); }
  .card.teal     { background: var(--teal-light); border-color: rgba(20,184,166,0.15); }
  .card.teal     .card-icon { background: var(--teal); color: white; }
  .card.teal:hover { border-color: var(--teal); }
  .card.slate    { background: var(--slate-light); border-color: rgba(71,85,105,0.15); }
  .card.slate    .card-icon { background: var(--slate); color: white; }
  .card.slate:hover { border-color: var(--slate); }

  .info-banner {
    background: linear-gradient(135deg, var(--violet), var(--ocean));
    color: white; border-radius: 20px; padding: 32px 36px;
    margin-bottom: 40px; animation: popIn 0.6s ease 0.05s both;
    position: relative; overflow: hidden;
  }
  .info-banner::before { content: ''; position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.08); border-radius: 50%; top: -60px; right: -40px; }
  .info-banner::after { content: ''; position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.06); border-radius: 50%; bottom: -30px; left: 30px; }
  .info-banner h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; margin-bottom: 8px; position: relative; z-index: 1; }
  .info-banner p { font-size: 0.9rem; opacity: 0.9; line-height: 1.6; position: relative; z-index: 1; max-width: 500px; }

  footer { text-align: center; margin-top: 56px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.06); animation: popIn 0.6s ease 0.4s both; cursor: default; -webkit-user-select: none; user-select: none; }
  footer p { color: var(--text-dim); font-size: 0.8rem; font-weight: 500; }
  footer .hearts { display: flex; justify-content: center; gap: 4px; margin-top: 6px; font-size: 0.6rem; }
  footer .hearts span:nth-child(1) { color: var(--coral); }
  footer .hearts span:nth-child(2) { color: var(--sun); }
  footer .hearts span:nth-child(3) { color: var(--mint); }
  footer .hearts span:nth-child(4) { color: var(--violet); }
  footer .hearts span:nth-child(5) { color: var(--sky); }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Admin styles ── */
  .admin-container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto; padding: 48px 24px 80px;
  }

  /* Back button in admin */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: white; cursor: pointer; font-family: inherit;
    font-size: 0.85rem; font-weight: 600; color: var(--text-dim);
    margin-bottom: 20px; transition: all 0.2s;
  }
  .back-btn:hover { background: var(--bg); color: var(--text); }

  .login-box {
    max-width: 380px; margin: 80px auto; background: white;
    border-radius: 16px; padding: 40px; border: 1px solid var(--border);
    text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .login-box h2 { font-size: 1.3rem; margin-bottom: 6px; }
  .login-box p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; }
  .login-box input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.95rem; font-family: inherit; margin-bottom: 12px;
  }
  .login-box input:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,92,252,0.1); }
  .login-box button {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: var(--violet); color: white; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 10px; display: none; }

  .panel {
    background: white; border-radius: 12px; border: 1px solid var(--border);
    margin-bottom: 20px; overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .panel-header:hover { background: #F8FAFC; }
  .panel-header h2 { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .panel-body { padding: 20px; }
  .panel-body.collapsed { display: none; }

  .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; font-family: inherit; background: white; color: var(--text);
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary { background: var(--violet); color: white; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: var(--danger); color: white; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-danger:hover { opacity: 0.9; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  .card-editor {
    background: #F8FAFC; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 12px;
  }
  .card-editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-editor-header h3 { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .card-editor-actions { display: flex; gap: 4px; align-items: center; }

  /* Order buttons */
  .order-btn {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
    background: white; cursor: pointer; font-size: 0.9rem; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
    color: var(--text-dim); padding: 0;
  }
  .order-btn:hover { background: var(--violet); color: white; border-color: var(--violet); }
  .order-btn:disabled { opacity: 0.3; cursor: default; background: white; color: var(--text-dim); border-color: var(--border); }

  /* Section order buttons */
  .section-order { display: flex; gap: 4px; margin-left: auto; margin-right: 12px; }

  /* Panel header toggle icon */
  .panel-toggle {
    font-size: 0.75rem; color: var(--text-dim); transition: transform 0.2s;
    flex-shrink: 0; margin-left: 8px;
  }
  .panel-toggle.collapsed { transform: rotate(-90deg); }

  .card-preview {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-radius: 12px; margin-bottom: 14px; border: 1.5px solid transparent;
  }
  .card-preview .icon {
    width: 40px; height: 40px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; font-size: 1.2rem; color: white;
    overflow: hidden; flex-shrink: 0;
  }
  .card-preview .icon img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .card-preview .info { flex: 1; }
  .card-preview .info .name { font-weight: 600; font-size: 0.9rem; }
  .card-preview .info .desc { font-size: 0.75rem; color: var(--text-dim); }

  .color-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-option {
    width: 32px; height: 32px; border-radius: 8px; border: 2px solid transparent;
    cursor: pointer; transition: all 0.2s;
  }
  .color-option:hover { transform: scale(1.1); }
  .color-option.selected { border-color: var(--text); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text); }

  .icon-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .icon-toggle button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: white; cursor: pointer; font-size: 0.8rem; font-family: inherit; font-weight: 500;
  }
  .icon-toggle button.active { background: var(--violet); color: white; border-color: var(--violet); }

  .upload-area {
    border: 2px dashed var(--border); border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .upload-area:hover { border-color: var(--violet); background: rgba(124,92,252,0.03); }
  .upload-area input { display: none; }
  .upload-area p { font-size: 0.8rem; color: var(--text-dim); }
  .current-image { margin-top: 8px; }
  .current-image img { max-height: 50px; border-radius: 6px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--success); color: white;
    padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
    opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 480px) {
    .container, .admin-container { padding: 32px 16px 60px; }
    header h1 { font-size: 2rem; }
    .cards { grid-template-columns: 1fr; }
    .info-banner { padding: 24px 20px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- PAGE VIEW -->
<div class="container" id="page-view">
  <p style="text-align:center;padding:60px;color:var(--text-dim);">Chargement...</p>
</div>

<!-- ADMIN VIEW (hidden by default) -->
<div class="admin-container" id="admin-view" style="display:none;">
  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-box">
      <h2>Administration</h2>
      <p>Entrez le mot de passe pour acceder au panneau d'administration.</p>
      <div class="login-error" id="login-error">Mot de passe incorrect</div>
      <input type="password" id="login-password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') doLogin()">
      <button onclick="doLogin()">Se connecter</button>
    </div>
  </div>
  <!-- Admin panel (hidden until login) -->
  <div id="admin-panel" style="display:none;"></div>
</div>

<div class="toast" id="toast">Sauvegarde reussie !</div>

<script>
// ── Shared ──
const COLORS = [
  { name: 'coral', hex: '#FF6B6B', label: 'Rouge' },
  { name: 'sky', hex: '#4ECDC4', label: 'Turquoise' },
  { name: 'violet', hex: '#7C5CFC', label: 'Violet' },
  { name: 'civis', hex: '#FFD42D', label: 'Jaune' },
  { name: 'mint', hex: '#2ED47A', label: 'Vert' },
  { name: 'rose', hex: '#F76CA5', label: 'Rose' },
  { name: 'ocean', hex: '#3B82F6', label: 'Bleu' },
  { name: 'lavender', hex: '#A78BFA', label: 'Mauve' },
  { name: 'amber', hex: '#F59E0B', label: 'Ambre' },
  { name: 'indigo', hex: '#6366F1', label: 'Indigo' },
  { name: 'emerald', hex: '#059669', label: 'Emeraude' },
  { name: 'fuchsia', hex: '#D946EF', label: 'Fuchsia' },
  { name: 'teal', hex: '#14B8A6', label: 'Sarcelle' },
  { name: 'slate', hex: '#475569', label: 'Ardoise' },
];
const SECTION_COLORS = [
  { name: 'coral', hex: '#FF6B6B' }, { name: 'sky', hex: '#4ECDC4' },
  { name: 'violet', hex: '#7C5CFC' }, { name: 'sun', hex: '#FFB340' },
  { name: 'mint', hex: '#2ED47A' }, { name: 'rose', hex: '#F76CA5' },
  { name: 'ocean', hex: '#3B82F6' }, { name: 'lavender', hex: '#A78BFA' },
  { name: 'amber', hex: '#F59E0B' }, { name: 'indigo', hex: '#6366F1' },
  { name: 'emerald', hex: '#059669' }, { name: 'fuchsia', hex: '#D946EF' },
  { name: 'teal', hex: '#14B8A6' }, { name: 'slate', hex: '#475569' },
];

let data = null;
let authToken = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function getColorHex(n) { return (COLORS.find(c => c.name === n) || {}).hex || '#7C5CFC'; }
function getSectionColorHex(n) { return (SECTION_COLORS.find(c => c.name === n) || {}).hex || '#7C5CFC'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || 'Sauvegarde reussie !';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (authToken) opts.headers['X-Auth-Token'] = authToken;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('image', file);
  const headers = {};
  if (authToken) headers['X-Auth-Token'] = authToken;
  const res = await fetch('/api/upload', { method: 'POST', body: fd, headers });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function loadData() {
  data = await (await fetch('/api/data')).json();
}

// ── Secret admin access: double-click on footer ──
function showAdmin() {
  document.getElementById('page-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'block';
  if (authToken) renderAdmin();
}

function showPage() {
  document.getElementById('admin-view').style.display = 'none';
  document.getElementById('page-view').style.display = 'block';
  renderPage();
}

// ── PAGE RENDERING ──
async function renderPage() {
  await loadData();
  const el = document.getElementById('page-view');
  let html = '';

  html += `<header>
    <div class="badge">${esc(data.header.badge)}</div>
    <h1>${esc(data.header.title)}</h1>
    <p>${esc(data.header.description)}</p>
  </header>`;

  html += `<div class="info-banner">
    <h2>${esc(data.banner.title)}</h2>
    <p>${esc(data.banner.text)}</p>
  </div>`;

  data.sections.forEach(section => {
    html += `<div class="section">
      <div class="section-header">
        <div class="section-dot" style="background: var(--${esc(section.color)})"></div>
        <div class="section-title">${esc(section.title)}</div>
      </div>
      <div class="cards">`;
    section.cards.forEach(card => {
      const iconHtml = card.icon === 'image' && card.image
        ? `<img src="${esc(card.image)}" alt="${esc(card.name)}">`
        : esc(card.emoji || '');
      const target = card.link && card.link.startsWith('mailto:') ? '' : ' target="_blank"';
      html += `<a href="${esc(card.link)}"${target} class="card ${esc(card.color)}">
        <div class="card-icon">${iconHtml}</div>
        <div class="card-info">
          <div class="card-name">${esc(card.name)}</div>
          <div class="card-desc">${esc(card.desc)}</div>
        </div>
        <span class="card-arrow">&rarr;</span>
      </a>`;
    });
    html += `</div></div>`;
  });

  html += `<footer id="footer-secret">
    <p>Derniere mise a jour : Mars 2026</p>
    <div class="hearts">
      <span>&#9679;</span><span>&#9679;</span><span>&#9679;</span><span>&#9679;</span><span>&#9679;</span>
    </div>
  </footer>`;

  el.innerHTML = html;

  // Secret admin access: 5 rapid clicks on footer
  const footer = document.getElementById('footer-secret');
  if (footer) {
    let clickCount = 0;
    let clickTimer = null;
    footer.addEventListener('click', function() {
      clickCount++;
      clearTimeout(clickTimer);
      if (clickCount >= 5) {
        clickCount = 0;
        showAdmin();
      } else {
        clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
      }
    });
  }
}

// ── AUTH ──
async function doLogin() {
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  const result = await res.json();

  if (!result.ok) {
    errEl.textContent = result.error || 'Mot de passe incorrect';
    errEl.style.display = 'block';
    return;
  }

  authToken = result.token;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = '';
  await loadData();
  renderAdmin();
}

function logout() {
  authToken = null;
  document.getElementById('login-screen').style.display = '';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// ── ADMIN RENDERING ──
function renderAdmin() {
  const app = document.getElementById('admin-panel');
  let html = '';

  html += `<button class="back-btn" onclick="showPage()">&larr; Retour a la page</button>`;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1 style="font-size:1.3rem;">Administration</h1>
    <button class="btn-danger btn-sm" onclick="logout(); showPage();">Deconnexion</button>
  </div>`;

  // Header
  html += `<div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>En-tete de la page</h2><span class="panel-toggle">&#9660;</span>
    </div>
    <div class="panel-body">
      <div class="form-group"><label>Badge</label>
        <input type="text" value="${esc(data.header.badge)}" onchange="saveHeader('badge', this.value)"></div>
      <div class="form-group"><label>Titre</label>
        <input type="text" value="${esc(data.header.title)}" onchange="saveHeader('title', this.value)"></div>
      <div class="form-group"><label>Description</label>
        <textarea rows="2" onchange="saveHeader('description', this.value)">${esc(data.header.description)}</textarea></div>
    </div>
  </div>`;

  // Banner
  html += `<div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Banniere</h2><span class="panel-toggle">&#9660;</span>
    </div>
    <div class="panel-body">
      <div class="form-group"><label>Titre</label>
        <input type="text" value="${esc(data.banner.title)}" onchange="saveBanner('title', this.value)"></div>
      <div class="form-group"><label>Message</label>
        <textarea rows="3" onchange="saveBanner('text', this.value)">${esc(data.banner.text)}</textarea></div>
    </div>
  </div>`;

  // Sections
  data.sections.forEach((section, si) => {
    let cardsHtml = '';
    section.cards.forEach((card, ci) => {
      cardsHtml += renderCardEditor(section, card, ci, section.cards.length);
    });

    const isFirst = si === 0;
    const isLast = si === data.sections.length - 1;

    html += `<div class="panel">
      <div class="panel-header">
        <h2 onclick="togglePanel(this.closest('.panel-header'))" style="cursor:pointer;flex:1;">
          <span class="color-dot" style="background:${getSectionColorHex(section.color)}"></span> ${esc(section.title)}
        </h2>
        <div class="section-order" onclick="event.stopPropagation()">
          <button class="order-btn" title="Monter" onclick="moveSection('${section.id}',-1)" ${isFirst ? 'disabled' : ''}>&#9650;</button>
          <button class="order-btn" title="Descendre" onclick="moveSection('${section.id}',1)" ${isLast ? 'disabled' : ''}>&#9660;</button>
        </div>
        <span class="panel-toggle" onclick="togglePanel(this.closest('.panel-header'))">&#9660;</span>
      </div>
      <div class="panel-body">
        <div class="form-row" style="margin-bottom:16px;">
          <div class="form-group"><label>Nom de la section</label>
            <input type="text" value="${esc(section.title)}" onchange="saveSection('${section.id}','title',this.value)"></div>
          <div class="form-group"><label>Couleur de la section</label>
            <div class="color-picker">
              ${SECTION_COLORS.map(c => `<div class="color-option ${section.color === c.name ? 'selected' : ''}" style="background:${c.hex}" onclick="saveSection('${section.id}','color','${c.name}')"></div>`).join('')}
            </div></div>
        </div>
        ${cardsHtml}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-primary btn-sm" onclick="addCard('${section.id}')">+ Ajouter une carte</button>
          <button class="btn-danger btn-sm" onclick="deleteSection('${section.id}')">Supprimer la section</button>
        </div>
      </div>
    </div>`;
  });

  html += `<div style="text-align:center;margin:20px 0;">
    <button class="btn-primary" onclick="addSection()">+ Nouvelle section</button>
  </div>`;

  app.innerHTML = html;
}

function renderCardEditor(section, card, index, total) {
  const bgLight = getColorHex(card.color) + '18';
  const iconHtml = card.icon === 'image' && card.image
    ? `<img src="${esc(card.image)}" alt="">`
    : esc(card.emoji || '');
  const isFirst = index === 0;
  const isLast = index === total - 1;

  return `<div class="card-editor">
    <div class="card-editor-header">
      <h3><span class="color-dot" style="background:${getColorHex(card.color)}"></span> ${esc(card.name)}</h3>
      <div class="card-editor-actions">
        <button class="order-btn" title="Monter" onclick="moveCard('${section.id}','${card.id}',-1)" ${isFirst ? 'disabled' : ''}>&#9650;</button>
        <button class="order-btn" title="Descendre" onclick="moveCard('${section.id}','${card.id}',1)" ${isLast ? 'disabled' : ''}>&#9660;</button>
        <button class="btn-danger btn-sm" onclick="deleteCard('${section.id}','${card.id}')">Supprimer</button>
      </div>
    </div>
    <div class="card-preview" style="background:${bgLight}">
      <div class="icon" style="background:${getColorHex(card.color)}">${iconHtml}</div>
      <div class="info"><div class="name">${esc(card.name)}</div><div class="desc">${esc(card.desc)}</div></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Nom</label>
        <input type="text" value="${esc(card.name)}" onchange="saveCard('${section.id}','${card.id}','name',this.value)"></div>
      <div class="form-group"><label>Description</label>
        <input type="text" value="${esc(card.desc)}" onchange="saveCard('${section.id}','${card.id}','desc',this.value)"></div>
    </div>
    <div class="form-group"><label>Lien (URL)</label>
      <input type="text" value="${esc(card.link)}" onchange="saveCard('${section.id}','${card.id}','link',this.value)"></div>
    <div class="form-group"><label>Couleur</label>
      <div class="color-picker">
        ${COLORS.map(c => `<div class="color-option ${card.color === c.name ? 'selected' : ''}" style="background:${c.hex}" title="${c.label}" onclick="saveCard('${section.id}','${card.id}','color','${c.name}')"></div>`).join('')}
      </div></div>
    <div class="form-group"><label>Icone</label>
      <div class="icon-toggle">
        <button class="${card.icon === 'emoji' ? 'active' : ''}" onclick="setIconType('${section.id}','${card.id}','emoji')">Emoji</button>
        <button class="${card.icon === 'image' ? 'active' : ''}" onclick="setIconType('${section.id}','${card.id}','image')">Image</button>
      </div>
      ${card.icon === 'emoji' ? `
        <input type="text" value="${esc(card.emoji)}" placeholder="Ex: &#128218;" onchange="saveCard('${section.id}','${card.id}','emoji',this.value)">
      ` : `
        <div class="upload-area" onclick="this.querySelector('input').click()">
          <input type="file" accept="image/*" onchange="handleUpload('${section.id}','${card.id}',this)">
          <p>Cliquer pour uploader une image</p>
          ${card.image ? `<div class="current-image"><img src="${esc(card.image)}" alt=""></div>` : ''}
        </div>
      `}
    </div>
  </div>`;
}

function togglePanel(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('collapsed');
  const icon = header.querySelector('.panel-toggle');
  if (icon) icon.classList.toggle('collapsed', body.classList.contains('collapsed'));
}

// ── Move cards / sections ──
async function moveCard(sectionId, cardId, direction) {
  const section = data.sections.find(s => s.id === sectionId);
  if (!section) return;
  const idx = section.cards.findIndex(c => c.id === cardId);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= section.cards.length) return;
  // Swap
  [section.cards[idx], section.cards[newIdx]] = [section.cards[newIdx], section.cards[idx]];
  const cardIds = section.cards.map(c => c.id);
  await api('PUT', `/api/sections/${sectionId}/reorder`, { cardIds });
  showToast('Ordre mis a jour');
  renderAdmin();
}

async function moveSection(sectionId, direction) {
  const idx = data.sections.findIndex(s => s.id === sectionId);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= data.sections.length) return;
  // Swap
  [data.sections[idx], data.sections[newIdx]] = [data.sections[newIdx], data.sections[idx]];
  const sectionIds = data.sections.map(s => s.id);
  await api('PUT', '/api/sections-reorder', { sectionIds });
  showToast('Ordre mis a jour');
  renderAdmin();
}

// ── Admin actions ──
async function saveHeader(field, value) {
  const r = await api('PUT', '/api/header', { [field]: value });
  if (!r) return;
  data.header[field] = value;
  showToast();
  renderAdmin();
}

async function saveBanner(field, value) {
  const r = await api('PUT', '/api/banner', { [field]: value });
  if (!r) return;
  data.banner[field] = value;
  showToast();
}

async function saveSection(sectionId, field, value) {
  const r = await api('PUT', `/api/sections/${sectionId}`, { [field]: value });
  if (!r) return;
  const s = data.sections.find(s => s.id === sectionId);
  if (s) s[field] = value;
  showToast();
  renderAdmin();
}

async function saveCard(sectionId, cardId, field, value) {
  const r = await api('PUT', `/api/sections/${sectionId}/cards/${cardId}`, { [field]: value });
  if (!r) return;
  const s = data.sections.find(s => s.id === sectionId);
  if (s) { const c = s.cards.find(c => c.id === cardId); if (c) c[field] = value; }
  showToast();
  renderAdmin();
}

async function setIconType(sectionId, cardId, type) {
  await saveCard(sectionId, cardId, 'icon', type);
}

async function handleUpload(sectionId, cardId, input) {
  if (!input.files[0]) return;
  const result = await uploadImage(input.files[0]);
  if (result && result.path) {
    await saveCard(sectionId, cardId, 'image', result.path);
    await saveCard(sectionId, cardId, 'icon', 'image');
  }
}

async function addCard(sectionId) {
  const r = await api('POST', `/api/sections/${sectionId}/cards`, {});
  if (!r) return;
  await loadData();
  renderAdmin();
  showToast('Carte ajoutee !');
}

async function deleteCard(sectionId, cardId) {
  if (!confirm('Supprimer cette carte ?')) return;
  const r = await api('DELETE', `/api/sections/${sectionId}/cards/${cardId}`);
  if (!r) return;
  await loadData();
  renderAdmin();
  showToast('Carte supprimee');
}

async function addSection() {
  const r = await api('POST', '/api/sections', { title: 'Nouvelle section', color: 'violet' });
  if (!r) return;
  await loadData();
  renderAdmin();
  showToast('Section ajoutee !');
}

async function deleteSection(sectionId) {
  if (!confirm('Supprimer cette section et toutes ses cartes ?')) return;
  const r = await api('DELETE', `/api/sections/${sectionId}`);
  if (!r) return;
  await loadData();
  renderAdmin();
  showToast('Section supprimee');
}

// ── Init ──
renderPage();
</script>
